  <text x="78" y="236" class="mono panel-title">REGIME LANE</text>
  <text x="1170" y="236" class="mono small">prices shown in ES points</text>

  <rect x="112" y="282" width="1176" height="68" rx="6" fill="url(#regime-band)" opacity="0.86"/>
  <rect x="112" y="282" width="407" height="68" rx="6" fill="#7f1d1d" opacity="0.45"/>
  <rect x="519" y="282" width="148" height="68" fill="#713f12" opacity="0.48"/>
  <rect x="667" y="282" width="621" height="68" rx="6" fill="#14532d" opacity="0.45"/>

  <line x1="112" y1="372" x2="1288" y2="372" stroke="#334155" stroke-width="2"/>
  <g class="mono small">
    <text x="98" y="402">5900</text>
    <text x="310" y="402">5920</text>
    <text x="522" y="402">5940</text>
    <text x="734" y="402">5960</text>
    <text x="946" y="402">5980</text>
    <text x="1165" y="402">6000</text>
  </g>
  <g stroke="#263241" stroke-width="1">
    <line x1="112" y1="266" x2="112" y2="388"/>
    <line x1="348" y1="266" x2="348" y2="388"/>
    <line x1="584" y1="266" x2="584" y2="388"/>
    <line x1="820" y1="266" x2="820" y2="388"/>
    <line x1="1056" y1="266" x2="1056" y2="388"/>
    <line x1="1288" y1="266" x2="1288" y2="388"/>
