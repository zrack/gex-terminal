  <rect x="54" y="836" width="1292" height="24" rx="5" fill="#0b1118" stroke="#202b37"/>
  <text x="76" y="854" class="mono small">provider: LIVE</text>
  <text x="198" y="854" class="mono small">latency: 82ms</text>
  <text x="330" y="854" class="mono small">last tick: 1.4s ago</text>
  <text x="505" y="854" class="mono small">mode: research</text>
  <text x="650" y="854" class="mono small">alert keys: zero-gamma, wall-shift, imbalance, stale-feed</text>
  <text x="1160" y="854" class="mono small">q quit | e export | a alerts</text>
</svg>
