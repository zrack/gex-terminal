  <text x="518" y="744" class="mono label">Largest strike</text>
  <text x="690" y="744" class="mono value">5965</text>
  <text x="518" y="784" class="mono label">Net session GEX</text>
  <text x="690" y="784" class="mono green" font-size="22" font-weight="700">+8.7B</text>

  <rect x="934" y="544" width="412" height="270" rx="8" class="panel"/>
  <text x="958" y="578" class="mono panel-title">EVENT TAPE</text>
  <line x1="958" y1="598" x2="1322" y2="598" class="muted-line"/>
  <text x="958" y="634" class="mono small">09:47:12</text>
  <text x="1046" y="634" class="mono green" font-size="16">price holding above zero-gamma</text>
  <text x="958" y="674" class="mono small">09:43:08</text>
  <text x="1046" y="674" class="mono cyan" font-size="16">gamma wall shifted 5955 to 5965</text>
  <text x="958" y="714" class="mono small">09:38:51</text>
  <text x="1046" y="714" class="mono yellow" font-size="16">call imbalance crossed 1.35x</text>
  <text x="958" y="754" class="mono small">09:31:20</text>
