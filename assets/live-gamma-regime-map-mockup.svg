  <text x="532" y="454" class="mono yellow" font-size="16" font-weight="700">ZERO-GAMMA 5941.50</text>

  <line x1="692" y1="250" x2="692" y2="438" stroke="#38bdf8" stroke-width="4"/>
  <polygon points="692,244 680,263 704,263" fill="#38bdf8"/>
  <text x="648" y="482" class="mono cyan" font-size="17" font-weight="700">SPOT 5948.75</text>

  <line x1="884" y1="258" x2="884" y2="428" stroke="#4ade80" stroke-width="4"/>
  <circle cx="884" cy="282" r="8" fill="#4ade80" filter="url(#soft-glow)"/>
  <text x="826" y="454" class="mono green" font-size="16" font-weight="700">GAMMA WALL 5965</text>

  <line x1="414" y1="258" x2="414" y2="428" stroke="#fb7185" stroke-width="3"/>
  <text x="354" y="482" class="mono red" font-size="16" font-weight="700">PUT WALL 5925</text>
  <line x1="1002" y1="258" x2="1002" y2="428" stroke="#86efac" stroke-width="3"/>
