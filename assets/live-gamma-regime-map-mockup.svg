<svg width="1400" height="900" viewBox="0 0 1400 900" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Live Gamma Regime Map mockup for gex-terminal</title>
  <desc id="desc">A terminal-style mockup showing price, gamma wall, zero-gamma node, regime state, alerts, and exposure bands.</desc>
  <defs>
    <linearGradient id="terminal-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#071018"/>
      <stop offset="0.55" stop-color="#0d141b"/>
      <stop offset="1" stop-color="#101319"/>
    </linearGradient>
    <linearGradient id="regime-band" x1="0" x2="1">
      <stop offset="0" stop-color="#fb7185"/>
      <stop offset="0.45" stop-color="#fbbf24"/>
      <stop offset="0.64" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#4ade80"/>
    </linearGradient>
    <filter id="soft-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .mono { font-family: "Fira Code", "SFMono-Regular", Consolas, monospace; }
      .label { fill: #94a3b8; font-size: 16px; }
      .small { fill: #64748b; font-size: 13px; }
      .value { fill: #e2e8f0; font-size: 22px; font-weight: 700; }
      .panel-title { fill: #cbd5e1; font-size: 17px; font-weight: 700; letter-spacing: 0; }
      .muted-line { stroke: #1f2a35; stroke-width: 1; }
      .frame { fill: #111820; stroke: #263241; stroke-width: 1.5; }
      .panel { fill: #0d141c; stroke: #253244; stroke-width: 1.2; }
      .green { fill: #4ade80; }
      .cyan { fill: #38bdf8; }
      .yellow { fill: #fbbf24; }
      .red { fill: #fb7185; }
      .white { fill: #f8fafc; }
    </style>
  </defs>

  <rect width="1400" height="900" fill="#05080c"/>
  <rect x="28" y="24" width="1344" height="852" rx="14" fill="url(#terminal-bg)" stroke="#2a3848" stroke-width="2"/>
  <rect x="28" y="24" width="1344" height="46" rx="14" fill="#111827"/>
  <circle cx="58" cy="47" r="7" fill="#fb7185"/>
  <circle cx="82" cy="47" r="7" fill="#fbbf24"/>
  <circle cx="106" cy="47" r="7" fill="#4ade80"/>
  <text x="132" y="53" class="mono white" font-size="18" font-weight="700">gex-terminal // live gamma regime map</text>
  <text x="1020" y="53" class="mono label">ES M5 | Tradovate demo | 0DTE | 09:47:12 PT</text>

  <rect x="54" y="92" width="1292" height="86" rx="8" class="frame"/>
  <text x="78" y="125" class="mono label">REGIME</text>
  <text x="78" y="158" class="mono" fill="#4ade80" font-size="30" font-weight="800">PINNED POSITIVE GAMMA</text>
  <text x="470" y="125" class="mono label">SPOT</text>
  <text x="470" y="158" class="mono value">5948.75</text>
  <text x="630" y="125" class="mono label">ZERO GAMMA</text>
  <text x="630" y="158" class="mono value">5941.50</text>
  <text x="830" y="125" class="mono label">GAMMA WALL</text>
  <text x="830" y="158" class="mono value">5965</text>
