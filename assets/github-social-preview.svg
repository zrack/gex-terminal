<svg width="1280" height="640" viewBox="0 0 1280 640" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">gex-terminal social preview</title>
  <desc id="desc">Open-source terminal UI for intraday gamma exposure, market-structure levels, and replayable options research.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#06111a"/>
      <stop offset="0.5" stop-color="#0b141d"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="lane" x1="0" x2="1">
      <stop offset="0" stop-color="#fb7185"/>
      <stop offset="0.45" stop-color="#fbbf24"/>
      <stop offset="0.62" stop-color="#38bdf8"/>
      <stop offset="1" stop-color="#4ade80"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .mono { font-family: "Fira Code", "SFMono-Regular", Consolas, monospace; }
      .title { fill: #f8fafc; font-size: 72px; font-weight: 800; }
      .subtitle { fill: #cbd5e1; font-size: 28px; font-weight: 500; }
      .small { fill: #94a3b8; font-size: 22px; }
      .label { fill: #64748b; font-size: 18px; }
      .value { fill: #e2e8f0; font-size: 30px; font-weight: 700; }
    </style>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect x="58" y="54" width="1164" height="532" rx="18" fill="#0b1118" stroke="#2a394a" stroke-width="2"/>
  <rect x="58" y="54" width="1164" height="54" rx="18" fill="#111827"/>
  <circle cx="90" cy="82" r="8" fill="#fb7185"/>
  <circle cx="118" cy="82" r="8" fill="#fbbf24"/>
  <circle cx="146" cy="82" r="8" fill="#4ade80"/>
  <text x="178" y="90" class="mono label">gex-terminal // local market-structure research</text>

  <text x="92" y="205" class="mono title">gex-terminal</text>
  <text x="98" y="252" class="mono subtitle">Open-source intraday Gamma Exposure terminal</text>
  <text x="98" y="296" class="mono small">GEX levels • zero-gamma • replay data • provider adapters</text>

  <rect x="96" y="352" width="760" height="58" rx="7" fill="url(#lane)" opacity="0.86"/>
  <line x1="438" y1="336" x2="438" y2="430" stroke="#fbbf24" stroke-width="4" stroke-dasharray="8 7"/>
  <line x1="526" y1="328" x2="526" y2="438" stroke="#38bdf8" stroke-width="5"/>
  <line x1="684" y1="336" x2="684" y2="430" stroke="#4ade80" stroke-width="5"/>
  <circle cx="438" cy="352" r="8" fill="#fbbf24" filter="url(#glow)"/>
  <circle cx="684" cy="352" r="8" fill="#4ade80" filter="url(#glow)"/>
  <text x="112" y="392" class="mono" fill="#f8fafc" font-size="22" font-weight="700">NEG GAMMA</text>
  <text x="462" y="392" class="mono" fill="#f8fafc" font-size="22" font-weight="700">SPOT</text>
  <text x="610" y="392" class="mono" fill="#f8fafc" font-size="22" font-weight="700">POS GAMMA</text>
  <text x="378" y="462" class="mono" fill="#fbbf24" font-size="18" font-weight="700">ZERO-GAMMA</text>
  <text x="644" y="462" class="mono" fill="#4ade80" font-size="18" font-weight="700">GAMMA WALL</text>

  <rect x="896" y="178" width="272" height="284" rx="10" fill="#101923" stroke="#253244"/>
  <text x="922" y="220" class="mono label">REGIME</text>
  <text x="922" y="262" class="mono" fill="#4ade80" font-size="28" font-weight="800">PINNED</text>
  <text x="922" y="306" class="mono label">SPOT</text>
  <text x="1022" y="306" class="mono value">5948.75</text>
  <text x="922" y="352" class="mono label">WALL</text>
  <text x="1022" y="352" class="mono value">5965</text>
  <text x="922" y="398" class="mono label">ALERT</text>
  <text x="1022" y="398" class="mono" fill="#fbbf24" font-size="24" font-weight="700">ARMED</text>

  <text x="96" y="530" class="mono small">Python • Textual • ES/NQ • local-first • explainable model</text>
  <text x="816" y="530" class="mono small">github.com/zrack/gex-terminal</text>
</svg>
